#version: '3.9'

services:
  # PostgreSQL — solo para desarrollo
  db:
    image: postgres:16-alpine
    container_name: finance_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"    # Puerto estándar de PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgAdmin — interfaz visual para PostgreSQL (equivale a MySQL Workbench)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finance_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"      # Accedes en http://localhost:5050
    depends_on:
      - db

volumes:
  postgres_data:
