name: Reset Demo Data

on:
  schedule:
    # Cada día a las 3 AM UTC
    - cron: '0 3 * * *'
  # También permite ejecutarlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset demo database
        run: |
          curl -X POST ${{ secrets.API_URL }}/api/v1/admin/reset-demo \
            -H "x-reset-secret: ${{ secrets.RESET_SECRET }}"